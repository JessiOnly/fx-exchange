name: CI
on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: fx-app-spring

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: fx-app-spring/pom.xml
      - name: Build and test (unit + slice + Testcontainers IT)
        run: mvn -B verify

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: fx-app-spring/pom.xml
      - name: Validate
        run: mvn -B validate

  dependency-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: fx-app-spring/pom.xml
      - name: OWASP dependency check
        run: mvn -B org.owasp:dependency-check-maven:check
